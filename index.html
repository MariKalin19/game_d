<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ИВГУ Мега-Лабиринт — Цифровая экономика</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a2f1a 0%, #051a0a 100%);
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            overflow-x: auto;
        }

        #app {
            overflow-x: auto;
            max-width: 100vw;
            padding: 8px;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #1a1a2e;
            width: auto;
            height: auto;
            max-width: 100%;
        }

        /* Полупрозрачные кнопки управления (альтернатива джойстику) */
        .touch-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .touch-btn {
            width: 70px;
            height: 70px;
            background: rgba(30, 30, 50, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 180, 70, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            touch-action: manipulation;
        }
        .touch-btn:active {
            transform: scale(0.92);
            background: #ff5722;
        }
        @media (max-width: 600px) {
            .touch-btn { width: 60px; height: 60px; font-size: 1.7rem; }
            .touch-controls { gap: 12px; }
        }

        .screen {
            background: linear-gradient(135deg, rgba(255,248,225,0.98), rgba(255,240,200,0.98));
            border-radius: 60px;
            padding: 20px 25px;
            max-width: 1300px;
            width: 95vw;
            text-align: center;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ivsu-logo {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 5px gold); }
            50% { filter: drop-shadow(0 0 20px orange); }
        }

        button {
            background: linear-gradient(135deg, #ff7b2c, #ff5722);
            border: none;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #a23f0a;
            margin: 8px;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #a23f0a; }

        .avatar-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .avatar-option {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            transition: 0.2s;
            overflow: hidden;
            background: #f0f0f0;
        }
        .avatar-option img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-option.selected { transform: scale(1.08); border: 4px solid gold; box-shadow: 0 0 0 3px #ffd966; }

        .leaderboard {
            background: linear-gradient(135deg, #2c2c3a, #1a1a2a);
            border-radius: 30px;
            padding: 15px;
            color: white;
            margin: 15px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .leaderboard ol { margin: 0; padding-left: 20px; }
        .leaderboard li {
            margin: 8px 0;
            background: linear-gradient(90deg, #3a3a4a, #2a2a3a);
            padding: 8px 15px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .rank-1 { background: linear-gradient(90deg, #ffd700, #ffaa00); color: #1a1a2a; }
        .rank-2 { background: linear-gradient(90deg, #c0c0c0, #a0a0a0); }
        .rank-3 { background: linear-gradient(90deg, #cd7f32, #b8692a); }

        .countdown {
            font-size: 5rem;
            font-weight: bold;
            color: #ff5733;
            text-align: center;
            animation: pulse 0.5s ease infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

        .game-header {
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
            border-radius: 50px;
            padding: 8px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
        }
        .player-name-badge {
            background: linear-gradient(135deg, #ff7b2c, #ff5722);
            padding: 5px 18px;
            border-radius: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .player-avatar-large { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .stats-badge { background: rgba(0,0,0,0.7); padding: 5px 18px; border-radius: 40px; font-weight: bold; }
        
        .question-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .question-card {
            background: linear-gradient(135deg, #fff8e7, #fff0d0);
            padding: 25px;
            border-radius: 55px;
            max-width: 550px;
            width: 90%;
            text-align: center;
            animation: cardPop 0.25s ease;
        }
        @keyframes cardPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .question-option {
            background: linear-gradient(135deg, #ff7b2c, #ff5722);
            margin: 8px 0;
            padding: 10px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            width: 100%;
            border: none;
        }
        .flex-row { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        input { padding: 10px 20px; font-size: 1rem; border-radius: 50px; border: 2px solid #ffb347; width: 240px; text-align: center; }

        @media (orientation: landscape) and (max-width: 900px) {
            .game-header { font-size: 0.8rem; padding: 5px 12px; }
            .stats-badge, .player-name-badge { padding: 4px 12px; font-size: 0.8rem; }
        }
        
        .online-status {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 2px 8px;
            margin-left: 8px;
        }
        .dashboard-link {
            margin-top: 10px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border-radius: 20px;
        }
        .dashboard-link a {
            color: #ffaa44;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ========== КОНФИГУРАЦИЯ FIREBASE ==========
    // Firebase конфигурация (бесплатный проект)
    // ВАЖНО: Замените на свои данные из консоли Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDummyKeyReplaceWithYourOwn",  // Замените на реальный
        authDomain: "ivgu-maze.firebaseapp.com",
        databaseURL: "https://ivgu-maze-default-rtdb.firebaseio.com/",  // Замените
        projectId: "ivgu-maze",
        storageBucket: "ivgu-maze.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcdef123456"
    };
    
    // Для демонстрации используем localStorage + BroadcastChannel (работает на одном устройстве)
    // В реальном проекте создайте бесплатный Firebase проект и вставьте свои данные выше
    
    let firebaseInitialized = false;
    let db = null;
    let roomRef = null;
    let playersRef = null;
    
    // Пытаемся инициализировать Firebase, если нет - используем localStorage
    try {
        if (typeof firebase !== 'undefined' && firebaseConfig.apiKey !== "AIzaSyDummyKeyReplaceWithYourOwn") {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            firebaseInitialized = true;
            console.log("✅ Firebase подключен");
        }
    } catch(e) {
        console.warn("Firebase не настроен, используем localStorage режим", e);
    }
    
    // Режим синхронизации (Firebase или localStorage)
    const SYNC_MODE = firebaseInitialized ? 'firebase' : 'local';
    const ROOM_ID = "ivgu_maze_2025";
    
    // ========== НАСТРОЙКИ ИГРЫ ==========
    const MAZE_SIZE = 40;
    const CELL_SIZE = 22;

    const AVATAR_LIST = [
        { id: 1, name: "Программист", imageUrl: "https://cdn-icons-png.flaticon.com/512/1995/1995572.png", color: "#3498db" },
        { id: 2, name: "Кодер", imageUrl: "https://cdn-icons-png.flaticon.com/512/1995/1995576.png", color: "#e34234" },
        { id: 3, name: "Аналитик", imageUrl: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png", color: "#9b59b6" },
        { id: 4, name: "Киберспец", imageUrl: "https://cdn-icons-png.flaticon.com/512/2881/2881142.png", color: "#2ecc71" },
        { id: 5, name: "AI Разраб", imageUrl: "https://cdn-icons-png.flaticon.com/512/1995/1995612.png", color: "#f1c40f" },
        { id: 6, name: "Web Dev", imageUrl: "https://cdn-icons-png.flaticon.com/512/1055/1055687.png", color: "#e67e22" }
    ];

    function generateMaze(size) {
        let maze = Array(size).fill().map(() => Array(size).fill(1));
        function carve(x, y) {
            let dirs = [[0, -2], [2, 0], [0, 2], [-2, 0]];
            for (let i = dirs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
            }
            for (let [dx, dy] of dirs) {
                const nx = x + dx, ny = y + dy;
                if (nx > 0 && nx < size-1 && ny > 0 && ny < size-1 && maze[ny][nx] === 1) {
                    maze[ny][nx] = 0;
                    maze[y + dy/2][x + dx/2] = 0;
                    carve(nx, ny);
                }
            }
        }
        maze[1][1] = 0;
        carve(1, 1);
        maze[size-2][size-2] = 0;
        maze[size-2][size-3] = 0;
        maze[size-3][size-2] = 0;
        return maze;
    }

    let baseMaze = generateMaze(MAZE_SIZE);
    baseMaze[MAZE_SIZE-2][MAZE_SIZE-2] = 4;

    const questionsBank = [
        { text: "🤔 Что такое API?", options: ["Интерфейс программирования приложений", "Антивирус", "Язык разметки", "Протокол передачи"], correct: 0 },
        { text: "🗄️ Что означает SQL?", options: ["Structured Query Language", "Simple Question Language", "Strong Query Logic", "Sequential Query"], correct: 0 },
        { text: "📚 Что такое стек (LIFO)?", options: ["Очередь", "Стек", "Массив", "Список"], correct: 1 },
        { text: "🧬 Что такое ООП?", options: ["Объектно-ориентированное программирование", "Однопроходная обработка", "Оптимизация памяти", "Организация процессов"], correct: 0 },
        { text: "🐙 Что такое Git?", options: ["Система контроля версий", "Язык программирования", "Фреймворк", "База данных"], correct: 0 }
    ];
    function getRandomQuestion() { return { ...questionsBank[Math.floor(Math.random() * questionsBank.length)], id: Date.now() + Math.random() }; }

    let teleportPairs = {};
    function decorateMazeWithItems(maze) {
        teleportPairs = {};
        let newMaze = maze.map(row => [...row]);
        let positions = [];
        for(let y = 0; y < MAZE_SIZE; y++) {
            for(let x = 0; x < MAZE_SIZE; x++) {
                if(newMaze[y][x] === 0) positions.push([x, y]);
            }
        }
        for(let i = positions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [positions[i], positions[j]] = [positions[j], positions[i]];
        }
        for(let i = 0; i < 60 && i < positions.length; i++) { const [x,y] = positions[i]; if(newMaze[y][x] === 0) newMaze[y][x] = 2; }
        for(let i = 60; i < 95 && i < positions.length; i++) { const [x,y] = positions[i]; if(newMaze[y][x] === 0) newMaze[y][x] = 3; }
        for(let i = 95; i < 115 && i < positions.length; i++) { const [x,y] = positions[i]; if(newMaze[y][x] === 0) newMaze[y][x] = 5; }
        for(let i = 115; i < 130 && i < positions.length; i++) { const [x,y] = positions[i]; if(newMaze[y][x] === 0) newMaze[y][x] = 6; }
        const teleports = [];
        for(let i = 130; i < 140 && i < positions.length; i++) { const [x,y] = positions[i]; if(newMaze[y][x] === 0) { newMaze[y][x] = 7; teleports.push([x,y]); } }
        for(let i = 0; i < teleports.length; i += 2) {
            if(i+1 < teleports.length) {
                const t1 = teleports[i], t2 = teleports[i+1];
                teleportPairs[`${t1[0]},${t1[1]}`] = t2;
                teleportPairs[`${t2[0]},${t2[1]}`] = t1;
            }
        }
        return newMaze;
    }

    let gameMaze = decorateMazeWithItems(baseMaze);
    let players = {};
    let localPlayerId = null;
    let gameActive = false;
    let raceStartTime = 0;
    let finishOrder = [];
    let currentScreen = 'welcome';
    let appDiv;

    // Синхронизация состояния
    function broadcastGameState() {
        const state = {
            players: players,
            finishOrder: finishOrder,
            gameActive: gameActive,
            timestamp: Date.now()
        };
        
        if (SYNC_MODE === 'firebase' && roomRef) {
            roomRef.update({ players: players, finishOrder: finishOrder, gameActive: gameActive });
        } else {
            localStorage.setItem(`maze_${ROOM_ID}_state`, JSON.stringify(state));
            window.dispatchEvent(new StorageEvent('storage', { key: `maze_${ROOM_ID}_state`, newValue: JSON.stringify(state) }));
        }
    }

    function loadGlobalState() {
        if (SYNC_MODE === 'firebase' && roomRef) {
            roomRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    if (data.players) {
                        for(let id in data.players) {
                            if (id !== localPlayerId && data.players[id]) {
                                players[id] = data.players[id];
                            }
                        }
                    }
                    if (data.finishOrder) finishOrder = data.finishOrder;
                    if (data.gameActive !== undefined) gameActive = data.gameActive;
                    refreshUI();
                }
            });
        } else {
            const saved = localStorage.getItem(`maze_${ROOM_ID}_state`);
            if(saved) {
                try {
                    const state = JSON.parse(saved);
                    for(let id in state.players) {
                        if(id !== localPlayerId && !players[id]) {
                            players[id] = state.players[id];
                        }
                    }
                    finishOrder = state.finishOrder || [];
                    gameActive = state.gameActive;
                    refreshUI();
                } catch(e) {}
            }
        }
    }

    function createEffect(x, y, text, color) {
        const canvas = document.getElementById('gameCanvas');
        if(!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const div = document.createElement('div');
        div.textContent = text;
        div.style.position = 'fixed';
        div.style.left = (rect.left + x * CELL_SIZE + CELL_SIZE/2) + 'px';
        div.style.top = (rect.top + y * CELL_SIZE) + 'px';
        div.style.fontSize = '1.3rem';
        div.style.fontWeight = 'bold';
        div.style.color = color;
        div.style.pointerEvents = 'none';
        div.style.zIndex = '1000';
        div.style.animation = 'flyUp 0.6s ease-out forwards';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 600);
    }
    const effectStyle = document.createElement('style');
    effectStyle.textContent = `@keyframes flyUp { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-40px); } }`;
    document.head.appendChild(effectStyle);

    function drawGame(ctx) {
        if(!ctx) return;
        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        for(let y = 0; y < MAZE_SIZE; y++) {
            for(let x = 0; x < MAZE_SIZE; x++) {
                let cell = gameMaze[y][x];
                let px = x * CELL_SIZE, py = y * CELL_SIZE;
                if(cell === 1) {
                    ctx.fillStyle = "#3c2a1f"; ctx.fillRect(px, py, CELL_SIZE-1, CELL_SIZE-1);
                    ctx.fillStyle = "#5c3e2a"; ctx.fillRect(px+2, py+2, CELL_SIZE-5, CELL_SIZE-5);
                } else if(cell === 2) {
                    ctx.fillStyle = "#f7d44a"; ctx.beginPath(); ctx.arc(px+CELL_SIZE/2, py+CELL_SIZE/2, 7, 0, 2*Math.PI); ctx.fill();
                    ctx.fillStyle = "#b8860b"; ctx.font = "12px sans-serif"; ctx.fillText("⭐", px+6, py+14);
                } else if(cell === 3) {
                    ctx.fillStyle = "#4d9de0"; ctx.fillRect(px+4, py+4, 14, 14);
                    ctx.fillStyle = "white"; ctx.font = "bold 12px sans-serif"; ctx.fillText("?", px+9, py+15);
                } else if(cell === 4) {
                    ctx.fillStyle = "#32cd32"; ctx.fillRect(px+4, py+4, 14, 14);
                    ctx.fillStyle = "white"; ctx.fillText("🏁", px+7, py+15);
                } else if(cell === 5) {
                    ctx.fillStyle = "#ff4444"; ctx.fillRect(px+4, py+4, 14, 14);
                    ctx.fillStyle = "white"; ctx.fillText("⚠️", px+6, py+15);
                } else if(cell === 6) {
                    ctx.fillStyle = "#44ff44"; ctx.fillRect(px+4, py+4, 14, 14);
                    ctx.fillStyle = "white"; ctx.fillText("⚡", px+8, py+15);
                } else if(cell === 7) {
                    ctx.fillStyle = "#aa44ff"; ctx.fillRect(px+4, py+4, 14, 14);
                    ctx.fillStyle = "white"; ctx.fillText("🌀", px+7, py+15);
                } else {
                    const grad = ctx.createLinearGradient(px, py, px+CELL_SIZE, py+CELL_SIZE);
                    grad.addColorStop(0, "#f0e6d2"); grad.addColorStop(1, "#e8dcc8");
                    ctx.fillStyle = grad; ctx.fillRect(px, py, CELL_SIZE-1, CELL_SIZE-1);
                }
            }
        }
        for(let pid in players) {
            const p = players[pid];
            if(p && !p.finished) {
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x * CELL_SIZE + CELL_SIZE/2, p.y * CELL_SIZE + CELL_SIZE/2, 9, 0, 2*Math.PI); ctx.fill();
                if(p.avatarImg && p.avatarImg.complete) ctx.drawImage(p.avatarImg, p.x * CELL_SIZE + 2, p.y * CELL_SIZE + 2, 17, 17);
                else { ctx.fillStyle = "white"; ctx.font = "13px sans-serif"; ctx.fillText("👤", p.x * CELL_SIZE + 5, p.y * CELL_SIZE + 15); }
            }
        }
        const localP = players[localPlayerId];
        if(localP && !localP.finished) {
            ctx.beginPath(); ctx.arc(localP.x * CELL_SIZE + CELL_SIZE/2, localP.y * CELL_SIZE + CELL_SIZE/2, 12, 0, 2*Math.PI);
            ctx.strokeStyle = "gold"; ctx.lineWidth = 2.5; ctx.stroke();
        }
    }

    function showQuestionModal(player, question) {
        const modal = document.createElement('div'); modal.className = 'question-modal';
        const card = document.createElement('div'); card.className = 'question-card';
        card.innerHTML = `<h3>❓ ${question.text}</h3><div id="qOptions"></div><p id="qFeedback"></p>`;
        modal.appendChild(card); document.body.appendChild(modal);
        const optsDiv = card.querySelector('#qOptions');
        question.options.forEach((opt, idx) => {
            const btn = document.createElement('button'); btn.textContent = opt; btn.className = 'question-option';
            btn.onclick = () => {
                if(idx === question.correct) {
                    player.score += 5; player.hasPendingQuestion = false;
                    if(gameMaze[player.y][player.x] === 3) gameMaze[player.y][player.x] = 0;
                    document.body.removeChild(modal); createEffect(player.x, player.y, "+5", "#2ecc71");
                    refreshUI(); broadcastGameState();
                } else {
                    const fb = card.querySelector('#qFeedback');
                    fb.innerHTML = '❌ Неправильно! Попробуй ещё раз'; fb.style.color = 'red';
                }
            };
            optsDiv.appendChild(btn);
        });
    }

    function tryMove(dx, dy) {
        const p = players[localPlayerId];
        if(!p || p.finished || !gameActive) return false;
        if(p.hasPendingQuestion) return false;
        if(p.frozenUntil && Date.now() < p.frozenUntil) return false;
        const newX = p.x + dx, newY = p.y + dy;
        if(newX < 0 || newX >= MAZE_SIZE || newY < 0 || newY >= MAZE_SIZE) return false;
        const cell = gameMaze[newY][newX];
        if(cell === 1) return false;
        p.x = newX; p.y = newY;
        if(cell === 2) { p.score += 10; gameMaze[newY][newX] = 0; createEffect(newX, newY, "+10⭐", "gold"); }
        else if(cell === 3) { p.hasPendingQuestion = true; showQuestionModal(p, getRandomQuestion()); }
        else if(cell === 4 && !p.finished) {
            p.finished = true; p.finishTime = Date.now() - raceStartTime;
            p.finishPosition = finishOrder.length + 1;
            finishOrder.push({ id: localPlayerId, name: p.name, score: p.score, time: p.finishTime, position: p.finishPosition });
            createEffect(newX, newY, "🏆 ФИНИШ!", "#ffd700");
            refreshUI(); broadcastGameState();
            setTimeout(() => {
                const allFinished = Object.values(players).every(p => p.finished === true);
                if(allFinished) { gameActive = false; showGlobalLeaderboard(); }
            }, 600);
        }
        else if(cell === 5) { p.frozenUntil = Date.now() + 1500; createEffect(newX, newY, "❄️ ЗАМОРОЗКА", "#88ccff"); }
        else if(cell === 6) { createEffect(newX, newY, "⚡ УСКОРЕНИЕ", "#44ff44"); gameMaze[newY][newX] = 0; }
        else if(cell === 7) {
            const key = `${newX},${newY}`;
            if(teleportPairs[key]) { const [tx, ty] = teleportPairs[key]; p.x = tx; p.y = ty; createEffect(newX, newY, "🌀 ТЕЛЕПОРТ", "#aa66ff"); createEffect(tx, ty, "🌀 ТЕЛЕПОРТ", "#aa66ff"); gameMaze[newY][newX] = 0; }
            else { gameMaze[newY][newX] = 0; }
        }
        refreshUI(); broadcastGameState();
        return true;
    }

    function refreshUI() {
        const canvas = document.getElementById('gameCanvas');
        if(canvas && currentScreen === 'game') { drawGame(canvas.getContext('2d')); }
        const status = document.getElementById('gameStatus');
        const p = players[localPlayerId];
        if(status && p) {
            const finished = Object.values(players).filter(pl => pl.finished).length;
            status.innerHTML = `⭐ ${p.score} | ${p.finished ? "🏁 ФИНИШ" : "🎯 В пути"} | 🏁 ${finished}/${Object.keys(players).length}`;
        }
    }

    function showGlobalLeaderboard() {
        const sorted = [...finishOrder].sort((a,b) => a.position - b.position);
        appDiv.innerHTML = `
            <div class="screen">
                <h2>🏆 ОБЩИЙ РЕЙТИНГ 🏆</h2>
                <div class="leaderboard">
                    <ol>${sorted.map(p => `<li class="${p.position === 1 ? 'rank-1' : p.position === 2 ? 'rank-2' : p.position === 3 ? 'rank-3' : ''}"><strong>${p.position}</strong> ${p.name} ⭐ ${p.score} ⏱️ ${(p.time/1000).toFixed(1)}с</li>`).join('')}</ol>
                </div>
                <div class="flex-row">
                    <button id="restartBtn">🔄 Сыграть снова</button>
                    <button id="menuBtn">🏠 Меню</button>
                </div>
            </div>
        `;
        document.getElementById('restartBtn')?.addEventListener('click', () => { resetAndRestart(); });
        document.getElementById('menuBtn')?.addEventListener('click', () => { window.location.reload(); });
    }

    function resetAndRestart() {
        gameActive = false;
        const p = players[localPlayerId];
        players = {}; finishOrder = [];
        gameMaze = decorateMazeWithItems(baseMaze);
        if(p) { p.x = 1; p.y = 1; p.score = 0; p.finished = false; p.finishTime = null; p.hasPendingQuestion = false; p.frozenUntil = null; players[localPlayerId] = p; }
        startCountdown();
    }

    function startRace() {
        gameActive = true; raceStartTime = Date.now(); finishOrder = [];
        for(let id in players) { 
            players[id].x = 1; players[id].y = 1; players[id].finished = false; 
            players[id].score = 0; players[id].finishTime = null; 
            players[id].hasPendingQuestion = false; players[id].frozenUntil = null; 
        }
        gameMaze = decorateMazeWithItems(baseMaze);
        currentScreen = 'game'; renderGameScreen(); broadcastGameState();
    }

    function startCountdown() {
        renderGameScreen();
        setTimeout(() => {
            const container = document.getElementById('gameContainerDiv');
            if(!container) return;
            let count = 3;
            container.innerHTML = `<div class="countdown">${count}</div>`;
            const interval = setInterval(() => {
                count--;
                if(count >= 1) container.innerHTML = `<div class="countdown">${count}</div>`;
                else if(count === 0) { clearInterval(interval); container.innerHTML = ''; startRace(); }
            }, 1000);
        }, 50);
    }

    function renderGameScreen() {
        const p = players[localPlayerId];
        appDiv.innerHTML = `
            <div class="game-container">
                <div class="game-header">
                    <div class="player-name-badge"><img class="player-avatar-large" src="${p?.avatarUrl || ''}"><span>${p?.name || 'Игрок'}</span></div>
                    <div class="stats-badge" id="gameStatus">⭐ 0 очков</div>
                </div>
                <div id="gameContainerDiv"><canvas id="gameCanvas" width="${MAZE_SIZE * CELL_SIZE}" height="${MAZE_SIZE * CELL_SIZE}"></canvas></div>
                <div class="touch-controls">
                    <div class="touch-btn" data-dx="0" data-dy="-1">▲</div>
                    <div class="touch-btn" data-dx="-1" data-dy="0">◀</div>
                    <div class="touch-btn" data-dx="0" data-dy="1">▼</div>
                    <div class="touch-btn" data-dx="1" data-dy="0">▶</div>
                </div>
                <div class="dashboard-link">
                    🖥️ <a href="#" id="dashboardLink">Открыть панель организатора</a>
                </div>
                <p style="color:white; margin-top:8px; text-align:center; font-size:0.7rem;">Нажми на кнопки | ⚠️ заморозка | ⚡ ускорение | 🌀 телепорт</p>
            </div>
        `;
        
        document.querySelectorAll('.touch-btn').forEach(btn => {
            const dx = parseInt(btn.dataset.dx), dy = parseInt(btn.dataset.dy);
            const handler = (e) => { e.preventDefault(); tryMove(dx, dy); };
            btn.addEventListener('click', handler); 
            btn.addEventListener('touchstart', handler, { passive: false });
        });
        
        const dashboardLink = document.getElementById('dashboardLink');
        if(dashboardLink) {
            dashboardLink.href = window.location.href.replace(/\/[^\/]*$/, '/dashboard.html');
            dashboardLink.target = '_blank';
        }
        
        refreshUI();
    }

    function renderWelcomeScreen() {
        appDiv.innerHTML = `<div class="screen"><div class="ivsu-logo">🏛️ ИВГУ</div><h2>Мега-Лабиринт</h2><p>⭐ Монетки +10 | ❓ Вопросы +5 | ⚠️ Ловушки | ⚡ Ускорение | 🌀 Телепорты</p><div><input type="text" id="playerName" placeholder="Твой никнейм"></div><button id="toAvatar">🎮 Выбрать аватар</button></div>`;
        document.getElementById('toAvatar')?.addEventListener('click', () => {
            const name = document.getElementById('playerName').value.trim();
            if(!name) return alert("Введите имя!");
            localPlayerId = "player_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
            const img = new Image(); img.src = AVATAR_LIST[0].imageUrl;
            players[localPlayerId] = { name, avatarUrl: AVATAR_LIST[0].imageUrl, color: AVATAR_LIST[0].color, x: 1, y: 1, score: 0, finished: false, finishTime: null, hasPendingQuestion: false, frozenUntil: null, avatarImg: img };
            currentScreen = 'avatarPick'; renderAvatarScreen();
        });
    }

    function renderAvatarScreen() {
        appDiv.innerHTML = `<div class="screen"><h2>Выбери аватар, ${players[localPlayerId]?.name}</h2><div class="avatar-selector" id="avatarSelector">${AVATAR_LIST.map((a, idx) => `<div class="avatar-option ${idx===0?'selected':''}" data-url="${a.imageUrl}" data-color="${a.color}"><img src="${a.imageUrl}"></div>`).join('')}</div><button id="startBtn">🏁 Начать гонку!</button></div>`;
        let selected = AVATAR_LIST[0];
        document.querySelectorAll('.avatar-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selected = { imageUrl: opt.dataset.url, color: opt.dataset.color };
            });
        });
        document.getElementById('startBtn')?.addEventListener('click', () => {
            players[localPlayerId].avatarUrl = selected.imageUrl; players[localPlayerId].color = selected.color;
            const img = new Image(); img.src = selected.imageUrl; players[localPlayerId].avatarImg = img;
            broadcastGameState();
            startCountdown();
        });
    }

    function init() {
        appDiv = document.getElementById('app');
        if (SYNC_MODE === 'firebase' && db) {
            roomRef = db.ref(`rooms/${ROOM_ID}`);
            playersRef = roomRef.child('players');
            loadGlobalState();
        } else {
            loadGlobalState();
            window.addEventListener('storage', (e) => { if(e.key === `maze_${ROOM_ID}_state`) { loadGlobalState(); refreshUI(); } });
        }
        renderWelcomeScreen();
    }
    init();
</script>
</body>
</html>

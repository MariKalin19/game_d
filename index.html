<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ИВГУ Мега-Лабиринт — Цифровая экономика</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a2f1a 0%, #051a0a 100%);
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            overflow-x: auto;
        }

        #app {
            overflow-x: auto;
            max-width: 100vw;
            padding: 8px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            background: #1a1a2e;
            width: 100%;
            height: auto;
        }

        /* Мобильные кнопки управления */
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(2, 70px);
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .ctrl-btn {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 2px solid #ffb347;
            border-radius: 50px;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #5a3e1a;
            font-weight: bold;
        }
        .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #5a3e1a;
        }
        @media (max-width: 850px) {
            .mobile-controls {
                display: grid;
            }
        }

        .screen {
            background: linear-gradient(135deg, rgba(255,248,225,0.98), rgba(255,240,200,0.98));
            border-radius: 60px;
            padding: 20px 25px;
            max-width: 1300px;
            width: 95vw;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ivsu-logo {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 5px gold); }
            50% { filter: drop-shadow(0 0 20px orange); }
        }

        button {
            background: linear-gradient(135deg, #ff7b2c, #ff5722);
            border: none;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #a23f0a;
            margin: 8px;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #a23f0a; }

        .avatar-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .avatar-option {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            transition: 0.2s;
            overflow: hidden;
            background: #f0f0f0;
        }
        .avatar-option img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-option.selected { transform: scale(1.08); border: 4px solid gold; box-shadow: 0 0 0 3px #ffd966; }

        .leaderboard {
            background: linear-gradient(135deg, #2c2c3a, #1a1a2a);
            border-radius: 30px;
            padding: 15px;
            color: white;
            margin: 15px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .leaderboard ol { margin: 0; padding-left: 20px; }
        .leaderboard li {
            margin: 8px 0;
            background: linear-gradient(90deg, #3a3a4a, #2a2a3a);
            padding: 8px 15px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .rank-1 { background: linear-gradient(90deg, #ffd700, #ffaa00); color: #1a1a2a; }
        .rank-2 { background: linear-gradient(90deg, #c0c0c0, #a0a0a0); }
        .rank-3 { background: linear-gradient(90deg, #cd7f32, #b8692a); }

        .countdown {
            font-size: 5rem;
            font-weight: bold;
            color: #ff5733;
            text-align: center;
            animation: pulse 0.5s ease infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

        .game-header {
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
            border-radius: 50px;
            padding: 8px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-wrap: wrap;
            gap: 8px;
        }
        .player-name-badge {
            background: linear-gradient(135deg, #ff7b2c, #ff5722);
            padding: 5px 18px;
            border-radius: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .player-avatar-large { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .stats-badge { background: rgba(0,0,0,0.7); padding: 5px 18px; border-radius: 40px; font-weight: bold; }
        .question-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .question-card {
            background: linear-gradient(135deg, #fff8e7, #fff0d0);
            padding: 25px;
            border-radius: 55px;
            max-width: 550px;
            width: 90%;
            text-align: center;
            animation: cardPop 0.25s ease;
        }
        @keyframes cardPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .question-option {
            background: linear-gradient(135deg, #ff7b2c, #ff5722);
            margin: 8px 0;
            padding: 10px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            width: 100%;
        }
        .flex-row { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        input { padding: 10px 20px; font-size: 1rem; border-radius: 50px; border: 2px solid #ffb347; width: 240px; text-align: center; }
        .finish-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 20px 40px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: bold;
            z-index: 2000;
            animation: bounce 0.4s ease;
            text-align: center;
            white-space: nowrap;
        }
        @keyframes bounce {
            0% { transform: translate(-50%, -50%) scale(0); }
            70% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        .global-rank-badge {
            background: gold;
            color: #1e2a1a;
            border-radius: 24px;
            padding: 6px 12px;
            font-weight: bold;
            margin-top: 6px;
            font-size: 0.8rem;
            display: inline-block;
        }
        @media (max-width: 600px) {
            .ctrl-btn { width: 60px; height: 60px; font-size: 1.8rem; }
            .mobile-controls { grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px); gap: 10px; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ========== НАСТРОЙКИ ==========
    const MAZE_SIZE = 40;
    const CELL_SIZE = 22;

    const AVATAR_LIST = [
        { id: 1, name: "Программист", imageUrl: "https://cdn-icons-png.flaticon.com/512/1995/1995572.png", color: "#3498db" },
        { id: 2, name: "Кодер", imageUrl: "https://cdn-icons-png.flaticon.com/512/1995/1995576.png", color: "#e34234" },
        { id: 3, name: "Аналитик", imageUrl: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png", color: "#9b59b6" },
        { id: 4, name: "Киберспец", imageUrl: "https://cdn-icons-png.flaticon.com/512/2881/2881142.png", color: "#2ecc71" },
        { id: 5, name: "AI Разраб", imageUrl: "https://cdn-icons-png.flaticon.com/512/1995/1995612.png", color: "#f1c40f" },
        { id: 6, name: "Web Dev", imageUrl: "https://cdn-icons-png.flaticon.com/512/1055/1055687.png", color: "#e67e22" }
    ];

    // Генерация лабиринта
    function generateMaze(size) {
        let maze = Array(size).fill().map(() => Array(size).fill(1));
        function carve(x, y) {
            let dirs = [[0, -2], [2, 0], [0, 2], [-2, 0]];
            for (let i = dirs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
            }
            for (let [dx, dy] of dirs) {
                const nx = x + dx, ny = y + dy;
                if (nx > 0 && nx < size-1 && ny > 0 && ny < size-1 && maze[ny][nx] === 1) {
                    maze[ny][nx] = 0;
                    maze[y + dy/2][x + dx/2] = 0;
                    carve(nx, ny);
                }
            }
        }
        maze[1][1] = 0;
        carve(1, 1);
        maze[size-2][size-2] = 0;
        maze[size-2][size-3] = 0;
        maze[size-3][size-2] = 0;
        return maze;
    }

    let baseMaze = generateMaze(MAZE_SIZE);
    baseMaze[MAZE_SIZE-2][MAZE_SIZE-2] = 4;

    const questionsBank = [
        { text: "🤔 Что такое API?", options: ["Интерфейс программирования приложений", "Антивирус", "Язык разметки", "Протокол передачи"], correct: 0 },
        { text: "🗄️ Что означает SQL?", options: ["Structured Query Language", "Simple Question Language", "Strong Query Logic", "Sequential Query"], correct: 0 },
        { text: "📚 Что такое стек (LIFO)?", options: ["Очередь", "Стек", "Массив", "Список"], correct: 1 },
        { text: "🧬 Что такое ООП?", options: ["Объектно-ориентированное программирование", "Однопроходная обработка", "Оптимизация памяти", "Организация процессов"], correct: 0 },
        { text: "🐙 Что такое Git?", options: ["Система контроля версий", "Язык программирования", "Фреймворк", "База данных"], correct: 0 },
        { text: "💡 Что такое цифровая экономика?", options: ["Экономика на цифровых технологиях", "Экономика интернета", "Криптоэкономика", "Виртуальная экономика"], correct: 0 },
        { text: "⛓️ Что такое блокчейн?", options: ["Распределённый реестр", "База данных", "Криптовалюта", "Сетевой протокол"], correct: 0 },
        { text: "📡 Что такое IoT?", options: ["Интернет вещей", "Интернет технологий", "Сеть устройств", "Цифровая сеть"], correct: 0 },
        { text: "🧠 Что такое ИИ?", options: ["Искусственный интеллект", "Интеллектуальная система", "Нейросети", "Робототехника"], correct: 0 },
        { text: "📈 Что такое Big Data?", options: ["Большие объёмы данных", "Большие базы", "Большие файлы", "Большие серверы"], correct: 0 }
    ];
    function getRandomQuestion() { return { ...questionsBank[Math.floor(Math.random() * questionsBank.length)], id: Date.now() + Math.random() }; }

    // Декорирование предметами
    let teleportPairs = {};
    function decorateMazeWithItems(maze) {
        teleportPairs = {};
        let newMaze = maze.map(row => [...row]);
        let positions = [];
        for(let y = 0; y < MAZE_SIZE; y++) {
            for(let x = 0; x < MAZE_SIZE; x++) {
                if(newMaze[y][x] === 0) positions.push([x, y]);
            }
        }
        for(let i = positions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [positions[i], positions[j]] = [positions[j], positions[i]];
        }
        // монетки
        for(let i = 0; i < 60 && i < positions.length; i++) {
            const [x,y] = positions[i];
            if(newMaze[y][x] === 0) newMaze[y][x] = 2;
        }
        // вопросы
        for(let i = 60; i < 95 && i < positions.length; i++) {
            const [x,y] = positions[i];
            if(newMaze[y][x] === 0) newMaze[y][x] = 3;
        }
        // ловушки
        for(let i = 95; i < 115 && i < positions.length; i++) {
            const [x,y] = positions[i];
            if(newMaze[y][x] === 0) newMaze[y][x] = 5;
        }
        // ускорения
        for(let i = 115; i < 130 && i < positions.length; i++) {
            const [x,y] = positions[i];
            if(newMaze[y][x] === 0) newMaze[y][x] = 6;
        }
        // телепорты
        const teleports = [];
        for(let i = 130; i < 140 && i < positions.length; i++) {
            const [x,y] = positions[i];
            if(newMaze[y][x] === 0) { newMaze[y][x] = 7; teleports.push([x,y]); }
        }
        for(let i = 0; i < teleports.length; i += 2) {
            if(i+1 < teleports.length) {
                const t1 = teleports[i], t2 = teleports[i+1];
                teleportPairs[`${t1[0]},${t1[1]}`] = t2;
                teleportPairs[`${t2[0]},${t2[1]}`] = t1;
            }
        }
        return newMaze;
    }

    let gameMaze = decorateMazeWithItems(baseMaze);
    let players = {};
    let nextPlayerId = 1;
    let gameActive = false;
    let raceStartTime = 0;
    let localPlayerId = null;
    let currentScreen = 'welcome';
    let finishOrder = [];    // массив объектов {id, name, avatarUrl, score, time, position}
    let appDiv;

    // Эффекты
    function createEffect(x, y, text, color) {
        const canvas = document.getElementById('gameCanvas');
        if(!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const div = document.createElement('div');
        div.textContent = text;
        div.style.position = 'fixed';
        div.style.left = (rect.left + x * CELL_SIZE + CELL_SIZE/2) + 'px';
        div.style.top = (rect.top + y * CELL_SIZE) + 'px';
        div.style.fontSize = '1.4rem';
        div.style.fontWeight = 'bold';
        div.style.color = color;
        div.style.pointerEvents = 'none';
        div.style.zIndex = '1000';
        div.style.animation = 'flyUp 0.7s ease-out forwards';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 700);
    }
    const effectStyle = document.createElement('style');
    effectStyle.textContent = `@keyframes flyUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-45px) scale(1.2); opacity: 0; } }`;
    document.head.appendChild(effectStyle);

    // Отрисовка всей игры
    function drawGame(ctx) {
        if(!ctx) return;
        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        for(let y = 0; y < MAZE_SIZE; y++) {
            for(let x = 0; x < MAZE_SIZE; x++) {
                let cell = gameMaze[y][x];
                let px = x * CELL_SIZE, py = y * CELL_SIZE;
                if(cell === 1) {
                    ctx.fillStyle = "#3c2a1f";
                    ctx.fillRect(px, py, CELL_SIZE-1, CELL_SIZE-1);
                    ctx.fillStyle = "#5c3e2a";
                    ctx.fillRect(px+2, py+2, CELL_SIZE-5, CELL_SIZE-5);
                } else if(cell === 2) {
                    ctx.fillStyle = "#f7d44a";
                    ctx.beginPath();
                    ctx.arc(px + CELL_SIZE/2, py + CELL_SIZE/2, 7, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.fillStyle = "#b8860b";
                    ctx.font = "12px sans-serif";
                    ctx.fillText("⭐", px+6, py+14);
                } else if(cell === 3) {
                    ctx.fillStyle = "#4d9de0";
                    ctx.fillRect(px+4, py+4, 14, 14);
                    ctx.fillStyle = "white";
                    ctx.font = "bold 12px sans-serif";
                    ctx.fillText("?", px+9, py+15);
                } else if(cell === 4) {
                    ctx.fillStyle = "#32cd32";
                    ctx.fillRect(px+4, py+4, 14, 14);
                    ctx.fillStyle = "white";
                    ctx.font = "10px sans-serif";
                    ctx.fillText("🏁", px+7, py+15);
                } else if(cell === 5) {
                    ctx.fillStyle = "#ff4444";
                    ctx.fillRect(px+4, py+4, 14, 14);
                    ctx.fillStyle = "white";
                    ctx.fillText("⚠️", px+6, py+15);
                } else if(cell === 6) {
                    ctx.fillStyle = "#44ff44";
                    ctx.fillRect(px+4, py+4, 14, 14);
                    ctx.fillStyle = "white";
                    ctx.fillText("⚡", px+8, py+15);
                } else if(cell === 7) {
                    ctx.fillStyle = "#aa44ff";
                    ctx.fillRect(px+4, py+4, 14, 14);
                    ctx.fillStyle = "white";
                    ctx.fillText("🌀", px+7, py+15);
                } else {
                    const gradient = ctx.createLinearGradient(px, py, px+CELL_SIZE, py+CELL_SIZE);
                    gradient.addColorStop(0, "#f0e6d2");
                    gradient.addColorStop(1, "#e8dcc8");
                    ctx.fillStyle = gradient;
                    ctx.fillRect(px, py, CELL_SIZE-1, CELL_SIZE-1);
                }
            }
        }
        // рисуем всех игроков
        for(let pid in players) {
            const p = players[pid];
            if(p && !p.finished) {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x * CELL_SIZE + CELL_SIZE/2, p.y * CELL_SIZE + CELL_SIZE/2, 9, 0, 2*Math.PI);
                ctx.fill();
                if(p.avatarImg && p.avatarImg.complete) {
                    ctx.drawImage(p.avatarImg, p.x * CELL_SIZE + 2, p.y * CELL_SIZE + 2, 17, 17);
                } else {
                    ctx.fillStyle = "white";
                    ctx.font = "13px sans-serif";
                    ctx.fillText("👤", p.x * CELL_SIZE + 5, p.y * CELL_SIZE + 15);
                }
            }
        }
        // обводка текущего игрока
        const localP = players[localPlayerId];
        if(localP && !localP.finished) {
            ctx.beginPath();
            ctx.arc(localP.x * CELL_SIZE + CELL_SIZE/2, localP.y * CELL_SIZE + CELL_SIZE/2, 12, 0, 2*Math.PI);
            ctx.strokeStyle = "gold";
            ctx.lineWidth = 2.5;
            ctx.stroke();
        }
    }

    // Модалка вопроса
    function showQuestionModal(player, question) {
        const modal = document.createElement('div');
        modal.className = 'question-modal';
        const card = document.createElement('div');
        card.className = 'question-card';
        card.innerHTML = `<h3>❓ ${question.text}</h3><div id="qOptions"></div><p id="qFeedback" style="margin-top:10px"></p>`;
        modal.appendChild(card);
        document.body.appendChild(modal);
        const optsDiv = card.querySelector('#qOptions');
        question.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.textContent = opt;
            btn.className = 'question-option';
            btn.onclick = () => {
                if(idx === question.correct) {
                    player.score += 5;
                    player.hasPendingQuestion = false;
                    if(gameMaze[player.y][player.x] === 3) gameMaze[player.y][player.x] = 0;
                    document.body.removeChild(modal);
                    createEffect(player.x, player.y, "+5", "#2ecc71");
                    refreshUI();
                } else {
                    const fb = card.querySelector('#qFeedback');
                    fb.innerHTML = '❌ Неправильно! Попробуй ещё раз';
                    fb.style.color = 'red';
                    card.style.animation = 'shake 0.3s';
                    setTimeout(() => card.style.animation = '', 300);
                }
            };
            optsDiv.appendChild(btn);
        });
    }

    function tryMove(playerId, dx, dy) {
        const p = players[playerId];
        if(!p || p.finished || !gameActive) return false;
        if(p.hasPendingQuestion) return false;
        if(p.frozenUntil && Date.now() < p.frozenUntil) return false;
        const newX = p.x + dx, newY = p.y + dy;
        if(newX < 0 || newX >= MAZE_SIZE || newY < 0 || newY >= MAZE_SIZE) return false;
        const cell = gameMaze[newY][newX];
        if(cell === 1) return false;
        p.x = newX;
        p.y = newY;
        if(cell === 2) {
            p.score += 10;
            gameMaze[newY][newX] = 0;
            createEffect(newX, newY, "+10⭐", "gold");
        } else if(cell === 3) {
            p.hasPendingQuestion = true;
            showQuestionModal(p, getRandomQuestion());
        } else if(cell === 4 && !p.finished) {
            p.finished = true;
            p.finishTime = Date.now() - raceStartTime;
            p.finishPosition = finishOrder.length + 1;
            finishOrder.push({ 
                id: playerId, name: p.name, avatarUrl: p.avatarUrl, 
                score: p.score, time: p.finishTime, position: p.finishPosition 
            });
            createEffect(newX, newY, "🏆 ФИНИШ!", "#ffd700");
            refreshUI();
            setTimeout(() => {
                const allFinished = Object.values(players).every(p => p.finished === true);
                if(allFinished) {
                    gameActive = false;
                    showGlobalLeaderboard();
                }
            }, 600);
        } else if(cell === 5) {
            p.frozenUntil = Date.now() + 1500;
            createEffect(newX, newY, "❄️ ЗАМОРОЗКА", "#88ccff");
        } else if(cell === 6) {
            createEffect(newX, newY, "⚡ УСКОРЕНИЕ", "#44ff44");
            gameMaze[newY][newX] = 0;
        } else if(cell === 7) {
            const key = `${newX},${newY}`;
            if(teleportPairs[key]) {
                const [tx, ty] = teleportPairs[key];
                p.x = tx;
                p.y = ty;
                createEffect(newX, newY, "🌀 ТЕЛЕПОРТ", "#aa66ff");
                createEffect(tx, ty, "🌀 ТЕЛЕПОРТ", "#aa66ff");
                gameMaze[newY][newX] = 0;
            } else {
                gameMaze[newY][newX] = 0;
            }
        }
        refreshUI();
        return true;
    }

    // Обновление интерфейса + отрисовка
    function refreshUI() {
        const canvas = document.getElementById('gameCanvas');
        if(canvas && currentScreen === 'game') {
            const ctx = canvas.getContext('2d');
            drawGame(ctx);
            const status = document.getElementById('gameStatus');
            const p = players[localPlayerId];
            if(status && p) {
                const finishedCount = Object.values(players).filter(pl => pl.finished).length;
                const total = Object.values(players).length;
                status.innerHTML = `⭐ ${p.score} очков | ${p.finished ? "🏁 ФИНИШ!" : "🎯 В пути"} | 🏁 ${finishedCount}/${total}`;
                if(p.frozenUntil && Date.now() < p.frozenUntil) status.innerHTML += " ❄️ ЗАМОРОЖЕН";
            }
        }
    }

    // ФИНАЛЬНЫЙ ЭКРАН РЕЙТИНГА
    function showGlobalLeaderboard() {
        const allPlayersList = Object.values(players);
        const sortedByFinish = [...finishOrder].sort((a,b) => a.position - b.position);
        const sortedByScore = [...allPlayersList].sort((a,b) => b.score - a.score);
        appDiv.innerHTML = `
            <div class="screen">
                <h2>🏆 ОБЩИЙ РЕЙТИНГ 🏆</h2>
                <h3>📊 ПОРЯДОК ФИНИША</h3>
                <div class="leaderboard">
                    <ol>
                        ${sortedByFinish.map(p => `
                            <li class="${p.position === 1 ? 'rank-1' : p.position === 2 ? 'rank-2' : p.position === 3 ? 'rank-3' : ''}">
                                <strong>${p.position} место</strong> 🏁 ${p.name} &nbsp;⭐ ${p.score} очков &nbsp;⏱️ ${(p.time/1000).toFixed(1)}с
                            </li>
                        `).join('')}
                    </ol>
                </div>
                <h3>💰 ТОП ПО ОЧКАМ</h3>
                <div class="leaderboard">
                    <ol>
                        ${sortedByScore.slice(0,10).map((pl, idx) => `
                            <li>
                                <span>${idx+1 === 1 ? '🥇' : idx+1 === 2 ? '🥈' : idx+1 === 3 ? '🥉' : `${idx+1}.`}</span>
                                <span>${pl.name}</span>
                                <span>⭐ ${pl.score}</span>
                                <span>${pl.finished ? '✅ финиш' : '⏳ не финишировал'}</span>
                            </li>
                        `).join('')}
                    </ol>
                </div>
                <div class="flex-row">
                    <button id="restartGame">🔄 Играть снова</button>
                    <button id="mainMenuBtn">🏠 Главное меню</button>
                </div>
            </div>
        `;
        document.getElementById('restartGame')?.addEventListener('click', () => {
            resetFullGame();
            startCountdown();
        });
        document.getElementById('mainMenuBtn')?.addEventListener('click', () => {
            players = {}; localPlayerId = null; nextPlayerId = 1; finishOrder = [];
            currentScreen = 'welcome';
            renderWelcomeScreen();
        });
    }

    function resetFullGame() {
        gameActive = false;
        const currentPlayerId = localPlayerId;
        const currentName = players[localPlayerId]?.name;
        const currentAvatarUrl = players[localPlayerId]?.avatarUrl;
        const currentColor = players[localPlayerId]?.color;
        const newId = localPlayerId;
        players = {};
        finishOrder = [];
        gameMaze = decorateMazeWithItems(baseMaze);
        const img = new Image();
        img.src = currentAvatarUrl || AVATAR_LIST[0].imageUrl;
        players[newId] = {
            name: currentName || "Игрок", avatarUrl: currentAvatarUrl || AVATAR_LIST[0].imageUrl,
            color: currentColor || AVATAR_LIST[0].color, x: 1, y: 1, score: 0, finished: false,
            finishTime: null, hasPendingQuestion: false, frozenUntil: null, avatarImg: img
        };
        localPlayerId = newId;
        const totalPlayers = Object.keys(players).length;
        if(totalPlayers === 1) {
            const withBots = confirm("🤖 Добавить ботов для соревнования?");
            if(withBots) {
                const botAvatars = AVATAR_LIST.slice(1, 6);
                botAvatars.forEach((bot, i) => {
                    const botImg = new Image();
                    botImg.src = bot.imageUrl;
                    players[`bot${i+1}`] = {
                        name: ["Анна (DevOps)", "Робот DataBot", "AI Мастер", "КиберЛена", "Web-Сергей"][i],
                        avatarUrl: bot.imageUrl, avatarImg: botImg, color: bot.color,
                        x: 1, y: 1, score: 0, finished: false, finishTime: null,
                        hasPendingQuestion: false, frozenUntil: null
                    };
                });
            }
        }
    }

    function startRace() {
        gameActive = true;
        raceStartTime = Date.now();
        finishOrder = [];
        for(let id in players) {
            players[id].x = 1;
            players[id].y = 1;
            players[id].finished = false;
            players[id].score = 0;
            players[id].finishTime = null;
            players[id].finishPosition = null;
            players[id].hasPendingQuestion = false;
            players[id].frozenUntil = null;
        }
        gameMaze = decorateMazeWithItems(baseMaze);
        currentScreen = 'game';
        renderGameScreen();
        const animate = () => {
            if(currentScreen === 'game') {
                const canvas = document.getElementById('gameCanvas');
                if(canvas && players[localPlayerId]) {
                    const ctx = canvas.getContext('2d');
                    drawGame(ctx);
                    refreshUI();
                }
                requestAnimationFrame(animate);
            }
        };
        animate();
    }

    function startCountdown() {
        renderGameScreen(); 
        setTimeout(() => {
            const container = document.getElementById('gameContainerDiv');
            if(!container) return;
            let count = 3;
            container.innerHTML = `<div class="countdown">${count}</div>`;
            const interval = setInterval(() => {
                count--;
                if(count >= 1) container.innerHTML = `<div class="countdown">${count}</div>`;
                else if(count === 0) {
                    clearInterval(interval);
                    container.innerHTML = '';
                    startRace();
                }
            }, 1000);
        }, 50);
    }

    function renderGameScreen() {
        const p = players[localPlayerId];
        appDiv.innerHTML = `
            <div>
                <div class="game-header">
                    <div class="player-name-badge">
                        <img class="player-avatar-large" src="${p?.avatarUrl || ''}">
                        <span>${p?.name || 'Игрок'}</span>
                    </div>
                    <div class="stats-badge" id="gameStatus">⭐ 0 очков</div>
                </div>
                <div id="gameContainerDiv"><canvas id="gameCanvas" width="${MAZE_SIZE * CELL_SIZE}" height="${MAZE_SIZE * CELL_SIZE}"></canvas></div>
                <div class="mobile-controls">
                    <div></div><div class="ctrl-btn" data-dx="0" data-dy="-1">⬆️</div><div></div>
                    <div class="ctrl-btn" data-dx="-1" data-dy="0">⬅️</div><div class="ctrl-btn" data-dx="0" data-dy="1">⬇️</div><div class="ctrl-btn" data-dx="1" data-dy="0">➡️</div>
                </div>
                <p style="color:white; margin-top:8px; text-align:center; font-size:0.8rem;">⬆️⬇️⬅️➡️ / кнопки на экране | ⚠️ заморозка | ⚡ ускорение | 🌀 телепорт</p>
            </div>
        `;
        window.removeEventListener('keydown', handleKey);
        window.addEventListener('keydown', handleKey);
        document.querySelectorAll('.ctrl-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const dx = parseInt(btn.dataset.dx);
                const dy = parseInt(btn.dataset.dy);
                if(!isNaN(dx) && !isNaN(dy)) tryMove(localPlayerId, dx, dy);
            });
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const dx = parseInt(btn.dataset.dx);
                const dy = parseInt(btn.dataset.dy);
                if(!isNaN(dx) && !isNaN(dy)) tryMove(localPlayerId, dx, dy);
            });
        });
        refreshUI();
    }

    function handleKey(e) {
        if(currentScreen !== 'game') return;
        const p = players[localPlayerId];
        if(!p || p.finished) return;
        const moves = { ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0] };
        if(moves[e.key]) {
            tryMove(localPlayerId, moves[e.key][0], moves[e.key][1]);
            e.preventDefault();
        }
    }

    function renderWelcomeScreen() {
        appDiv.innerHTML = `
            <div class="screen">
                <div class="ivsu-logo">🏛️ ИВГУ</div>
                <h2>🔰 Мега-Лабиринт абитуриента (40×40)</h2>
                <p>⭐ Монетки | ❓ Вопросы | ⚠️ Ловушки | ⚡ Ускорение | 🌀 Телепорты</p>
                <div><input type="text" id="playerName" placeholder="Твой никнейм" maxlength="16"></div>
                <button id="toAvatar">🎮 Выбрать аватар</button>
            </div>
        `;
        document.getElementById('toAvatar')?.addEventListener('click', () => {
            const name = document.getElementById('playerName').value.trim();
            if(!name) return alert("Введи имя!");
            const newId = (nextPlayerId++).toString();
            localPlayerId = newId;
            const img = new Image();
            img.src = AVATAR_LIST[0].imageUrl;
            players[newId] = {
                name, avatarUrl: AVATAR_LIST[0].imageUrl, color: AVATAR_LIST[0].color,
                x: 1, y: 1, score: 0, finished: false, finishTime: null,
                hasPendingQuestion: false, frozenUntil: null, avatarImg: img
            };
            currentScreen = 'avatarPick';
            renderAvatarScreen();
        });
    }

    function renderAvatarScreen() {
        appDiv.innerHTML = `
            <div class="screen">
                <h2>🎨 Выбери аватар, ${players[localPlayerId]?.name}</h2>
                <div class="avatar-selector" id="avatarSelector">
                    ${AVATAR_LIST.map((a, idx) => `<div class="avatar-option ${idx===0?'selected':''}" data-url="${a.imageUrl}" data-color="${a.color}"><img src="${a.imageUrl}"></div>`).join('')}
                </div>
                <button id="startBtn">🏁 Начать гонку!</button>
            </div>
        `;
        let selected = AVATAR_LIST[0];
        document.querySelectorAll('.avatar-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selected = { imageUrl: opt.dataset.url, color: opt.dataset.color };
            });
        });
        document.getElementById('startBtn')?.addEventListener('click', () => {
            if(players[localPlayerId]) {
                players[localPlayerId].avatarUrl = selected.imageUrl;
                players[localPlayerId].color = selected.color;
                const img = new Image();
                img.src = selected.imageUrl;
                players[localPlayerId].avatarImg = img;
            }
            if(Object.keys(players).length === 1) {
                const withBots = confirm("🤖 Играть с ботами? (для соревнования)");
                if(withBots) {
                    const botAvatars = AVATAR_LIST.slice(1, 6);
                    botAvatars.forEach((bot, i) => {
                        const botImg = new Image();
                        botImg.src = bot.imageUrl;
                        players[`bot${i+1}`] = {
                            name: ["Анна (DevOps)", "Робот DataBot", "AI Мастер", "КиберЛена", "Web-Сергей"][i],
                            avatarUrl: bot.imageUrl, avatarImg: botImg, color: bot.color,
                            x: 1, y: 1, score: 0, finished: false, finishTime: null,
                            hasPendingQuestion: false, frozenUntil: null
                        };
                    });
                    nextPlayerId += 5;
                }
            }
            startCountdown();
        });
    }

    function init() {
        appDiv = document.getElementById('app');
        renderWelcomeScreen();
    }
    init();
</script>
</body>
</html>

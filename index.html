    // ==================== НАСТРОЙКИ ИГРЫ ====================
    const MAZE_SIZE = 20;

    const AVATAR_LIST = [
        { id: 1, imageUrl: "https://cdn-icons-png.flaticon.com/512/4472/4472533.png", color: "#8B5CF6", emoji: "🧙" },

    const questionsBank = [
        { text: "💾 Что из перечисленного является оперативной памятью?", options: ["Жесткий диск", "SSD-накопитель", "RAM", "Процессор"], correct: 2 },
        { text: "🔢 Сколько бит в одном байте?", options: ["2", "8", "16", "1024"], correct: 1 },
        { text: "💻 Какой системой счисления пользуется компьютер внутри себя?", options: ["Десятичной", "Двоичной", "Шестнадцатеричной", "Троичной"], correct: 1 },
        { text: "📋 Что такое алгоритм?", options: ["Название программы", "Последовательность действий для решения задачи", "Ошибка в коде", "Тип процессора"], correct: 1 },
        { text: "🌐 Что означает аббревиатура IP-адрес?", options: ["Internet Protocol Address", "Internal Program Access", "Important Computer Code", "Internet Password"], correct: 0 },
        { text: "⚡ Для чего нужен кэш (cache) процессора?", options: ["Для долговременного хранения фильмов", "Для ускорения доступа к часто используемым данным", "Для подключения к интернету", "Для вывода изображения на монитор"], correct: 1 },
        { text: "🧮 Что выведет на экран этот код? x = 5; y = 3; print(x + y * 2)", options: ["16", "11", "10", "13"], correct: 1 },
        { text: "🔄 Что такое «цикл» в программировании?", options: ["Тип данных для хранения текста", "Конструкция, которая повторяет блок кода несколько раз", "Графический интерфейс программы", "Ошибка компиляции"], correct: 1 },
        { text: "⚖️ В чем разница между «=» и «==» в большинстве языков?", options: ["Никакой разницы", "= — присваивание, == — сравнение", "= — сравнение, == — присваивание", "Оба используются для вывода данных"], correct: 1 },
        { text: "🗄️ Как в базах данных принято называть одну запись об одном человеке?", options: ["Поле", "Ячейка", "Строка (запись)", "Формула"], correct: 2 },
        { text: "🔐 Что такое двухфакторная аутентификация (2FA)?", options: ["Два пароля подряд", "Вход по отпечатку пальца + по СМС-коду", "Два разных логина", "Два монитора у компьютера"], correct: 1 },
        { text: "⌨️ Что делает кнопка «Ctrl + Z» в любом редакторе?", options: ["Сохраняет файл", "Копирует выделенный фрагмент", "Отменяет последнее действие", "Закрывает программу"], correct: 2 }
    ];
    
    let playerUsedQuestions = {};
    let globalLeaderboard = [];
    let activePlayersRef = null;
    let leaderboardRef = null;
    
    function getRandomQuestionForPlayer(playerId) {
        if (!playerUsedQuestions[playerId]) playerUsedQuestions[playerId] = [];
        const usedIds = playerUsedQuestions[playerId];
        const availableQuestions = questionsBank.filter((_, idx) => !usedIds.includes(idx));
        
        if (availableQuestions.length === 0) {
            playerUsedQuestions[playerId] = [];
            const randomIndex = Math.floor(Math.random() * questionsBank.length);
            playerUsedQuestions[playerId].push(randomIndex);
            return { ...questionsBank[randomIndex], id: Date.now() + Math.random() };
        }
        
        const randomQuestionIndex = Math.floor(Math.random() * availableQuestions.length);
        const originalIndex = questionsBank.findIndex(q => q.text === availableQuestions[randomQuestionIndex].text);
        playerUsedQuestions[playerId].push(originalIndex);
        return { ...availableQuestions[randomQuestionIndex], id: Date.now() + Math.random() };
    }

    function generateMaze(size) {
        let maze = Array(size).fill().map(() => Array(size).fill(1));
        function carve(x, y) {
            let dirs = [[0, -2], [2, 0], [0, 2], [-2, 0]];
            for (let i = dirs.length - 1; i > 0; i--) { 
                const j = Math.floor(Math.random() * (i + 1)); 
                [dirs[i], dirs[j]] = [dirs[j], dirs[i]]; 
            }
            for (let [dx, dy] of dirs) {
                const nx = x + dx, ny = y + dy;
                if (nx > 0 && nx < size-1 && ny > 0 && ny < size-1 && maze[ny][nx] === 1) {
                    maze[ny][nx] = 0;
                    maze[y + dy/2][x + dx/2] = 0;
                    carve(nx, ny);
                }
            }
        }
        maze[1][1] = 0;
        carve(1, 1);
        maze[size-2][size-2] = 0;
        maze[size-2][size-3] = 0;
        maze[size-3][size-2] = 0;
        return maze;
    }

    let baseMaze = generateMaze(MAZE_SIZE);
    baseMaze[MAZE_SIZE-2][MAZE_SIZE-2] = 4;

    function decorateMazeWithItems(maze) {
        let newMaze = maze.map(row => [...row]);
        let positions = [];
        for(let y = 0; y < MAZE_SIZE; y++) {
            for(let x = 0; x < MAZE_SIZE; x++) {
                if(newMaze[y][x] === 0) positions.push([x, y]);
            }
        }
        for(let i = positions.length - 1; i > 0; i--) { 
            const j = Math.floor(Math.random() * (i + 1)); 
            [positions[i], positions[j]] = [positions[j], positions[i]]; 
        }
        
        for(let i = 0; i < 20 && i < positions.length; i++) { 
            const [x,y] = positions[i]; 
            if(newMaze[y][x] === 0) newMaze[y][x] = 2; 
        }
        for(let i = 20; i < 35 && i < positions.length; i++) { 
            const [x,y] = positions[i]; 
            if(newMaze[y][x] === 0) newMaze[y][x] = 3; 
        }
        for(let i = 35; i < 43 && i < positions.length; i++) { 
            const [x,y] = positions[i]; 
            if(newMaze[y][x] === 0) newMaze[y][x] = 5; 
        }
        for(let i = 43; i < 48 && i < positions.length; i++) { 
            const [x,y] = positions[i]; 
            if(newMaze[y][x] === 0) newMaze[y][x] = 6; 
        }
        return newMaze;
    }

    let gameMaze = decorateMazeWithItems(baseMaze);
    let players = {};
    let localPlayerId = null;
    let gameActive = false;
    let raceStartTime = 0;
    let currentScreen = 'welcome';
    let appDiv;
    let gameStateBeforeRating = null;
    let isFinishedSaved = false;

    // ========== FIREBASE: РЕЙТИНГ В РЕАЛЬНОМ ВРЕМЕНИ ==========
    function initFirebaseListeners() {
        // Слушаем изменения в рейтинге
        leaderboardRef = database.ref('leaderboard');
        leaderboardRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                globalLeaderboard = Object.values(data);
                // Сортируем по времени финиша
                globalLeaderboard.sort((a, b) => (a.finishTimestamp || 0) - (b.finishTimestamp || 0));
                // Добавляем позиции
                for (let i = 0; i < globalLeaderboard.length; i++) {
                    globalLeaderboard[i].position = i + 1;
                }
            } else {
                globalLeaderboard = [];
            }
            // Если сейчас на экране рейтинга - обновляем
            if (currentScreen === 'leaderboard' || currentScreen === 'ratingOnly') {
                renderLeaderboardScreen();
            }
        });
        
        // Слушаем активных игроков (для отображения в панели организатора)
        activePlayersRef = database.ref('activePlayers');
        // Просто слушаем, чтобы поддерживать актуальность
        activePlayersRef.on('value', () => {});
    }
    
    async function saveFinishToFirebase(player) {
        if (!player || !player.finished || isFinishedSaved) return false;
        
        const finishData = {
            id: player.id,
            name: player.name,
            score: player.score,
            time: player.finishTime,
            emoji: player.emoji,
            finishTimestamp: Date.now(),
            avatarUrl: player.avatarUrl
        };
        
        try {
            await database.ref('leaderboard/' + player.id).set(finishData);
            isFinishedSaved = true;
            return true;
        } catch(e) {
            console.warn("Ошибка сохранения в Firebase:", e);
            return false;
        }
    }
    
    async function updateActivePlayer(player, isActive = true) {
        if (!player || !player.id) return;
        const activeData = {
            id: player.id,
            name: player.name,
            emoji: player.emoji,
            score: player.score,
            finished: player.finished || false,
            lastSeen: Date.now(),
            avatarUrl: player.avatarUrl
        };
        
        if (isActive) {
            await database.ref('activePlayers/' + player.id).set(activeData);
        } else {
            await database.ref('activePlayers/' + player.id).remove();
        }
    }
    
    // Периодическое обновление статуса "активен"
    let heartbeatInterval = null;
    function startHeartbeat(player) {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(async () => {
            if (player && !player.finished) {
                await updateActivePlayer(player, true);
            }
        }, 15000); // каждые 15 секунд
    }
    
    function stopHeartbeat() {
        if (heartbeatInterval) {
            clearInterval(heartbeatInterval);
            heartbeatInterval = null;
        }
    }

    function createEffect(x, y, text, color) {
        const canvas = document.getElementById('gameCanvas');
        if(!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const div = document.createElement('div');
        div.textContent = text;
        div.style.position = 'fixed';
        div.style.left = (rect.left + x * CELL_SIZE + CELL_SIZE/2) + 'px';
        div.style.top = (rect.top + y * CELL_SIZE) + 'px';
        div.style.fontSize = '1.2rem';
        div.style.fontWeight = 'bold';
        div.style.color = color;
        div.style.pointerEvents = 'none';
        div.style.zIndex = '1000';
        div.style.animation = 'flyUp 0.6s ease-out forwards';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 600);
    }
    
    const effectStyle = document.createElement('style');
    effectStyle.textContent = `@keyframes flyUp { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-40px); } }`;
    document.head.appendChild(effectStyle);

    function drawGame(ctx) {
        if(!ctx) return;
        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        
        for(let y = 0; y < MAZE_SIZE; y++) {
            for(let x = 0; x < MAZE_SIZE; x++) {
                let cell = gameMaze[y][x];
                let px = x * CELL_SIZE, py = y * CELL_SIZE;
                if(cell === 1) {
                    ctx.fillStyle = "#3c2a1f";
                    ctx.fillRect(px, py, CELL_SIZE-1, CELL_SIZE-1);
                    ctx.fillStyle = "#5c3e2a";
                    ctx.fillRect(px+2, py+2, CELL_SIZE-5, CELL_SIZE-5);
                } else if(cell === 2) {
                    ctx.fillStyle = "#f7d44a";
                    ctx.beginPath(); 
                    ctx.arc(px + CELL_SIZE/2, py + CELL_SIZE/2, 8, 0, 2*Math.PI); 
                    ctx.fill();
                    ctx.fillStyle = "#b8860b";
                    ctx.font = "14px sans-serif";
                    ctx.fillText("⭐", px+7, py+15);
                } else if(cell === 3) {
                    ctx.fillStyle = "#4d9de0";
                    ctx.fillRect(px+4, py+4, 18, 18);
                    ctx.fillStyle = "white";
                    ctx.font = "bold 14px sans-serif";
                    ctx.fillText("?", px+10, py+17);
                } else if(cell === 4) {
                    ctx.fillStyle = "#32cd32";
                    ctx.fillRect(px+4, py+4, 18, 18);
                    ctx.fillStyle = "white";
                    ctx.font = "13px sans-serif";
                    ctx.fillText("🏁", px+8, py+17);
                } else if(cell === 5) {
                    ctx.fillStyle = "#ff4444";
                    ctx.fillRect(px+4, py+4, 18, 18);
                    ctx.fillStyle = "white";
                    ctx.font = "bold 14px sans-serif";
                    ctx.fillText("⚠️", px+7, py+17);
                } else if(cell === 6) {
                    ctx.fillStyle = "#44ff44";
                    ctx.fillRect(px+4, py+4, 18, 18);
                    ctx.fillStyle = "white";
                    ctx.font = "bold 14px sans-serif";
                    ctx.fillText("⚡", px+8, py+17);
                } else {
                    const gradient = ctx.createLinearGradient(px, py, px+CELL_SIZE, py+CELL_SIZE);
                    gradient.addColorStop(0, "#f0e6d2");
                    gradient.addColorStop(1, "#e8dcc8");
                    ctx.fillStyle = gradient;
                    ctx.fillRect(px, py, CELL_SIZE-1, CELL_SIZE-1);
                }
            }
        }
        
        const localP = players[localPlayerId];
        if(localP && !localP.finished) {
            const centerX = localP.x * CELL_SIZE + CELL_SIZE/2;
            const centerY = localP.y * CELL_SIZE + CELL_SIZE/2;
            
            ctx.shadowColor = "rgba(0,0,0,0.4)";
            ctx.shadowBlur = 4;
            ctx.fillStyle = localP.color;
            ctx.beginPath(); 
            ctx.arc(centerX, centerY, 12, 0, 2*Math.PI); 
            ctx.fill();
            ctx.beginPath(); 
            ctx.arc(centerX, centerY, 14, 0, 2*Math.PI);
            ctx.strokeStyle = "gold";
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.font = "18px sans-serif";
            ctx.fillStyle = "white";
            ctx.fillText(localP.emoji || "🧙", localP.x * CELL_SIZE + 8, localP.y * CELL_SIZE + 20);
            ctx.font = "bold 14px 'Segoe UI'";
            ctx.fillStyle = "#FFFFFF";
            ctx.shadowColor = "rgba(0,0,0,0.7)";
            const nameText = localP.name.length > 12 ? localP.name.slice(0,10)+".." : localP.name;
            ctx.fillText(nameText, centerX - 25, localP.y * CELL_SIZE - 4);
            ctx.shadowBlur = 0;
        }
    }

    function showQuestionModal(player, question) {
        const modal = document.createElement('div'); 
        modal.className = 'question-modal';
        const card = document.createElement('div'); 
        card.className = 'question-card';
        card.innerHTML = `<h3>❓ ${question.text}</h3><div id="qOptions"></div><p id="qFeedback" style="margin-top:10px; font-weight:bold;"></p>`;
        modal.appendChild(card); 
        document.body.appendChild(modal);
        const optsDiv = card.querySelector('#qOptions');
        question.options.forEach((opt, idx) => {
            const btn = document.createElement('button'); 
            btn.textContent = opt; 
            btn.className = 'question-option';
            btn.onclick = () => {
                if(idx === question.correct) {
                    player.score += 5; 
                    player.hasPendingQuestion = false;
                    if(gameMaze[player.y][player.x] === 3) gameMaze[player.y][player.x] = 0;
                    document.body.removeChild(modal); 
                    createEffect(player.x, player.y, "+5", "#2ecc71");
                    updateActivePlayer(player, true);
                    refreshUI(); 
                } else {
                    const fb = card.querySelector('#qFeedback');
                    fb.innerHTML = '❌ Неправильно! Попробуй ещё раз';
                    fb.style.color = 'red';
                }
            };
            optsDiv.appendChild(btn);
        });
    }

    async function tryMove(dx, dy) {
        const p = players[localPlayerId];
        if(!p || p.finished || !gameActive) return false;
        if(p.hasPendingQuestion) return false;
        if(p.frozenUntil && Date.now() < p.frozenUntil) return false;
        const newX = p.x + dx, newY = p.y + dy;
        if(newX < 0 || newX >= MAZE_SIZE || newY < 0 || newY >= MAZE_SIZE) return false;
        const cell = gameMaze[newY][newX];
        if(cell === 1) return false;
        p.x = newX; 
        p.y = newY;
        
        if(cell === 2) { 
            p.score += 10; 
            gameMaze[newY][newX] = 0; 
            createEffect(newX, newY, "+10⭐", "gold");
            await updateActivePlayer(p, true);
        }
        else if(cell === 3) { 
            p.hasPendingQuestion = true; 
            const uniqueQuestion = getRandomQuestionForPlayer(localPlayerId);
            showQuestionModal(p, uniqueQuestion); 
        }
        else if(cell === 4 && !p.finished && !isFinishedSaved) {
            p.finished = true; 
            p.finishTime = Date.now() - raceStartTime;
            
            createEffect(newX, newY, "🏆 ФИНИШ!", "#ffd700");
            refreshUI(); 
            gameActive = false;
            
            // Сохраняем в Firebase
            await saveFinishToFirebase(p);
            await updateActivePlayer(p, false);
            stopHeartbeat();
            
            setTimeout(() => {
                showGlobalLeaderboard();
            }, 600);
        }
        else if(cell === 5) { 
            p.frozenUntil = Date.now() + 1500; 
            createEffect(newX, newY, "❄️ ЗАМОРОЗКА", "#88ccff");
            await updateActivePlayer(p, true);
        }
        else if(cell === 6) { 
            createEffect(newX, newY, "⚡ УСКОРЕНИЕ", "#44ff44"); 
            gameMaze[newY][newX] = 0; 
        }
        refreshUI(); 
        return true;
    }

    function refreshUI() {
        const canvas = document.getElementById('gameCanvas');
        if(canvas && currentScreen === 'game') { 
            const ctx = canvas.getContext('2d');
            drawGame(ctx); 
        }
        const status = document.getElementById('gameStatus');
        const p = players[localPlayerId];
        if(status && p) {
            status.innerHTML = `⭐ ${p.score} | ${p.finished ? "🏁 ФИНИШ" : "🎯 В пути"}`;
        }
    }

    function saveGameState() {
        if (gameActive && players[localPlayerId] && !players[localPlayerId].finished) {
            gameStateBeforeRating = {
                gameActive: gameActive,
                gameMaze: gameMaze.map(row => [...row]),
                player: { ...players[localPlayerId] }
            };
        }
    }

    function resumeGame() {
        if (gameStateBeforeRating && gameStateBeforeRating.gameActive && !gameStateBeforeRating.player.finished) {
            gameActive = true;
            gameMaze = gameStateBeforeRating.gameMaze.map(row => [...row]);
            players[localPlayerId] = { ...gameStateBeforeRating.player };
            currentScreen = 'game';
            renderGameScreen();
            gameStateBeforeRating = null;
        } else {
            goToMainMenu();
        }
    }

    function goToMainMenu() {
        gameActive = false;
        gameStateBeforeRating = null;
        players = {};
        if (localPlayerId) {
            updateActivePlayer({ id: localPlayerId }, false);
        }
        localPlayerId = null;
        isFinishedSaved = false;
        currentScreen = 'welcome';
        renderWelcomeScreen();
    }

    function renderLeaderboardScreen() {
        const sorted = [...globalLeaderboard];
        appDiv.innerHTML = `
            <div class="screen">
                <h2 style="color:#ffd700;">🏆 ОБЩИЙ РЕЙТИНГ 🏆</h2>
                <div class="leaderboard">
                    <ul class="leaderboard-list">
                        ${sorted.length > 0 ? sorted.map(p => `
                            <li class="${p.position === 1 ? 'rank-1' : p.position === 2 ? 'rank-2' : p.position === 3 ? 'rank-3' : ''}">
                                <strong style="min-width: 50px;">${p.position}. место</strong> 
                                <span style="font-size:1.3rem;">${p.emoji || '🧙'}</span>
                                <span style="flex:1;"><strong>${p.name}</strong></span>
                                <span style="color: #ffd700;">⭐ ${p.score} очков</span>
                                <span>⏱️ ${(p.time/1000).toFixed(1)}с</span>
                            </li>
                        `).join('') : '<li style="justify-content:center;">Пока нет результатов</li>'}
                    </ul>
                </div>
                <div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
                    <button id="restartFromRatingBtn">🔄 Новая игра</button>
                    <button id="menuFromRatingBtn">🏠 Главное меню</button>
                </div>
                <div class="sync-status">🌐 Рейтинг в реальном времени (Firebase)</div>
            </div>
        `;
        
        document.getElementById('restartFromRatingBtn')?.addEventListener('click', () => {
            resetAndRestart();
        });
        document.getElementById('menuFromRatingBtn')?.addEventListener('click', () => {
            goToMainMenu();
        });
        currentScreen = 'ratingOnly';
    }

    function showGlobalLeaderboard() {
        renderLeaderboardScreen();
    }

    function resetAndRestart() {
        gameActive = false;
        gameStateBeforeRating = null;
        if (localPlayerId && players[localPlayerId]) {
            const p = players[localPlayerId];
            p.x = 1; p.y = 1; p.score = 0; p.finished = false; 
            p.finishTime = null; p.hasPendingQuestion = false; p.frozenUntil = null;
            isFinishedSaved = false;
            updateActivePlayer(p, true);
        }
        gameMaze = decorateMazeWithItems(baseMaze);
        startCountdown();
    }

    function startRace() {
        gameActive = true; 
        raceStartTime = Date.now(); 
        isFinishedSaved = false;
        if (localPlayerId && players[localPlayerId]) {
            players[localPlayerId].x = 1; 
            players[localPlayerId].y = 1; 
            players[localPlayerId].finished = false; 
            players[localPlayerId].score = 0; 
            players[localPlayerId].finishTime = null; 
            players[localPlayerId].hasPendingQuestion = false; 
            players[localPlayerId].frozenUntil = null;
            updateActivePlayer(players[localPlayerId], true);
            startHeartbeat(players[localPlayerId]);
        }
        gameMaze = decorateMazeWithItems(baseMaze);
        currentScreen = 'game'; 
        renderGameScreen(); 
    }

    function startCountdown() {
        renderGameScreen();
        setTimeout(() => {
            const container = document.getElementById('gameContainerDiv');
            if(!container) return;
            let count = 3;
            container.innerHTML = `<div class="countdown">${count}</div>`;
            const interval = setInterval(() => {
                count--;
                if(count >= 1) container.innerHTML = `<div class="countdown">${count}</div>`;
                else if(count === 0) { 
                    clearInterval(interval); 
                    container.innerHTML = ''; 
                    startRace(); 
                }
            }, 1000);
        }, 50);
    }

    function renderGameScreen() {
        const p = players[localPlayerId];
        appDiv.innerHTML = `
            <div class="game-container">
                <div class="game-header">
                    <div class="player-name-badge">
                        <img class="player-avatar-large" src="${p?.avatarUrl || ''}">
                        <span>${p?.name || 'Игрок'} ${p?.emoji || '🧙'}</span>
                    </div>
                    <div class="stats-badge" id="gameStatus">⭐ 0 очков</div>
                </div>
                <div id="gameContainerDiv"><canvas id="gameCanvas" width="${MAZE_SIZE * CELL_SIZE}" height="${MAZE_SIZE * CELL_SIZE}"></canvas></div>
                <div class="touch-controls">
                    <div class="touch-btn" data-dx="0" data-dy="-1">▲</div>
                    <div class="touch-btn" data-dx="-1" data-dy="0">◀</div>
                    <div class="touch-btn" data-dx="0" data-dy="1">▼</div>
                    <div class="touch-btn" data-dx="1" data-dy="0">▶</div>
                </div>
                <div class="rating-link">
                    📊 <a href="#" id="ratingLink">Посмотреть таблицу рейтинга</a>
                </div>
                <div class="sync-status">🌐 Рейтинг синхронизируется с облаком</div>
                <p style="color:white; margin-top:8px; text-align:center; font-size:0.7rem;">⭐ монетка +10 | ❓ вопрос +5 | ⚠️ заморозка | ⚡ ускорение</p>
            </div>
        `;
        document.querySelectorAll('.touch-btn').forEach(btn => {
            const dx = parseInt(btn.dataset.dx), dy = parseInt(btn.dataset.dy);
            const handler = (e) => { e.preventDefault(); tryMove(dx, dy); };
            btn.addEventListener('click', handler); 
            btn.addEventListener('touchstart', handler, { passive: false });
        });
        document.getElementById('ratingLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            saveGameState();
            renderLeaderboardScreen();
        });
        refreshUI();
    }

    function renderWelcomeScreen() {
        appDiv.innerHTML = `
            <div class="screen">
                <div class="ivsu-logo">🏛️ ИВГУ 🏛️</div>
                <h2>🔰 Мега-Лабиринт</h2>
                <p>⭐ Монетки +10 | ❓ Вопросы +5 | ⚠️ Ловушки | ⚡ Ускорение</p>
                <div><input type="text" id="playerName" placeholder="Ваше имя" maxlength="16"></div>
                <button id="toAvatar">🎮 Выбрать аватара</button>
                <div class="rating-link">
                    📊 <a href="#" id="ratingLinkWelcome">Посмотреть таблицу рейтинга</a>
                </div>
                <div class="sync-status">🌐 Рейтинг игроков (Firebase)</div>
            </div>
        `;
        document.getElementById('toAvatar')?.addEventListener('click', () => {
            const name = document.getElementById('playerName').value.trim();
            if(!name) return alert("Введите имя!");
            localPlayerId = "player_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
            players[localPlayerId] = { 
                id: localPlayerId,
                name, 
                avatarUrl: AVATAR_LIST[0].imageUrl, 
                color: AVATAR_LIST[0].color, 
                emoji: AVATAR_LIST[0].emoji,
                x: 1, 
                y: 1, 
                score: 0, 
                finished: false, 
                finishTime: null, 
                hasPendingQuestion: false, 
                frozenUntil: null
            };
            currentScreen = 'avatarPick'; 
            renderAvatarScreen();
        });
        document.getElementById('ratingLinkWelcome')?.addEventListener('click', (e) => {
            e.preventDefault();
            renderLeaderboardScreen();
        });
    }

    function renderAvatarScreen() {
        appDiv.innerHTML = `
            <div class="screen">
                <h2>🎨 ${players[localPlayerId]?.name},</h2> выберите аватара 
                <div class="avatar-selector" id="avatarSelector">
                    ${AVATAR_LIST.map((a, idx) => `
                        <div class="avatar-option ${idx===0?'selected':''}" data-url="${a.imageUrl}" data-color="${a.color}" data-emoji="${a.emoji}">
                            <img src="${a.imageUrl}">
                            <span>${a.emoji}</span>
                        </div>
                    `).join('')}
                </div>
                <button id="startBtn">🏁 Начать гонку!</button>
                <div class="rating-link">
                    📊 <a href="#" id="ratingLinkAvatar">Посмотреть таблицу рейтинга</a>
                </div>
            </div>
        `;
        let selected = AVATAR_LIST[0];
        document.querySelectorAll('.avatar-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selected = { 
                    imageUrl: opt.dataset.url, 
                    color: opt.dataset.color, 
                    emoji: opt.dataset.emoji
                };
            });
        });
        
        document.getElementById('startBtn')?.addEventListener('click', () => {
            players[localPlayerId].avatarUrl = selected.imageUrl; 
            players[localPlayerId].color = selected.color;
            players[localPlayerId].emoji = selected.emoji;
            startCountdown();
        });
        
        document.getElementById('ratingLinkAvatar')?.addEventListener('click', (e) => {
            e.preventDefault();
            renderLeaderboardScreen();
        });
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    async function init() {
        appDiv = document.getElementById('app');
        initFirebaseListeners();
        renderWelcomeScreen();
    }
    
    init();
</script>
</body>
</html>

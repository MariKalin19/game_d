<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИВГУ Лабиринт — Панель организатора</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a1f2e, #071520);
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            padding: 20px;
        }
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            text-shadow: 0 0 10px #ff8c00;
        }
        .qr-section {
            text-align: center;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .qr-code {
            background: white;
            display: inline-block;
            padding: 15px;
            border-radius: 20px;
        }
        .qr-code img {
            width: 180px;
            height: 180px;
            display: block;
        }
        .game-link {
            color: #ffaa44;
            word-break: break-all;
            font-size: 1rem;
            margin-top: 15px;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 30px;
            display: inline-block;
        }
        button {
            background: #ff5722;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            margin-left: 10px;
        }
        button:hover { opacity: 0.9; }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .player-card {
            background: rgba(30,30,50,0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 15px;
            border: 1px solid rgba(255,180,70,0.5);
            transition: 0.2s;
        }
        .player-card.finished { border-color: #4caf50; background: rgba(40,60,40,0.8); }
        .player-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid gold;
        }
        .player-name { font-size: 1.2rem; font-weight: bold; color: white; }
        .player-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            color: #ddd;
        }
        .score { color: #ffd700; font-size: 1.2rem; font-weight: bold; }
        .status.finished { color: #4caf50; }
        .status.playing { color: #ff9800; }
        .leaderboard-panel {
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 20px;
            margin-top: 20px;
        }
        .leaderboard-panel h2 { color: gold; margin-top: 0; }
        .leaderboard-list {
            list-style: none;
            padding: 0;
        }
        .leaderboard-list li {
            background: rgba(255,255,255,0.1);
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }
        .rank-1 { background: linear-gradient(90deg, #ffd700, #ffaa00); color: #1a1a2a; }
        .rank-2 { background: linear-gradient(90deg, #c0c0c0, #a0a0a0); }
        .rank-3 { background: linear-gradient(90deg, #cd7f32, #b8692a); }
        .waiting { animation: pulse 1.5s infinite; color: #ffaa44; text-align: center; padding: 40px; font-size: 1.2rem; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .refresh-btn { background: #2196f3; }
        .online-badge {
            background: #4caf50;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.7rem;
            margin-left: 10px;
        }
        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <h1>🏆 ИВГУ МЕГА-ЛАБИРИНТ 🏆</h1>
    
    <div class="qr-section">
        <h3>📱 Сканируйте QR-код для игры</h3>
        <div class="qr-code" id="qrCode">
            <!-- Здесь будет ваш QR-код из файла qr.jpg -->
            <img src="qr.jpg" alt="QR-код для входа в игру" style="width:180px; height:180px;" onerror="this.onerror=null; this.src='https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https://marikalin19.github.io/game/';">
        </div>
        <div class="game-link" id="gameLink">
            🔗 https://marikalin19.github.io/game/
        </div>
        <button id="copyLinkBtn">📋 Копировать ссылку</button>
        <button id="refreshBtn" class="refresh-btn">🔄 Обновить данные</button>
    </div>
    
    <h2>👥 ИГРОКИ ОНЛАЙН <span id="playersCount" class="online-badge">0</span></h2>
    <div class="players-grid" id="playersGrid">
        <div class="waiting">⏳ Ожидание подключения игроков...</div>
    </div>
    
    <div class="leaderboard-panel">
        <h2>📊 ТАБЛИЦА ЛИДЕРОВ</h2>
        <ul class="leaderboard-list" id="leaderboardList">
            <li>Нет данных</li>
        </ul>
    </div>
    <div class="footer-note">
        🖥️ Панель организатора обновляется автоматически раз в секунду
    </div>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ ==========
    const ROOM_ID = "ivgu_maze_2025";
    const GAME_URL = "https://marikalin19.github.io/game/";
    let currentState = { players: {}, finishOrder: [] };
    
    // Загрузка состояния из localStorage (синхронизация с игрой)
    function loadState() {
        const saved = localStorage.getItem(`maze_${ROOM_ID}_state`);
        if(saved) {
            try {
                currentState = JSON.parse(saved);
            } catch(e) {
                console.warn("Ошибка парсинга", e);
            }
        }
        renderDashboard();
    }
    
    function renderDashboard() {
        const players = currentState.players || {};
        const finishOrder = currentState.finishOrder || [];
        const playersGrid = document.getElementById('playersGrid');
        const leaderboardList = document.getElementById('leaderboardList');
        const playersCountSpan = document.getElementById('playersCount');
        
        const playersArray = Object.values(players);
        playersCountSpan.textContent = playersArray.length;
        
        if(playersArray.length === 0) {
            playersGrid.innerHTML = '<div class="waiting">👥 Нет активных игроков. Попросите отсканировать QR-код!</div>';
        } else {
            playersGrid.innerHTML = playersArray.map(p => `
                <div class="player-card ${p.finished ? 'finished' : ''}">
                    <div class="player-header">
                        <img class="player-avatar" src="${p.avatarUrl || 'https://cdn-icons-png.flaticon.com/512/1995/1995572.png'}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1995/1995572.png'">
                        <div>
                            <div class="player-name">${escapeHtml(p.name)}</div>
                            <div style="font-size:0.75rem; opacity:0.7;">${p.finished ? `🏁 Финиш: ${p.finishPosition || '?'} место` : '🎯 В пути'}</div>
                        </div>
                    </div>
                    <div class="player-stats">
                        <span>⭐ <span class="score">${p.score || 0}</span> очков</span>
                        <span class="status ${p.finished ? 'finished' : 'playing'}">${p.finished ? '✅ ФИНИШ' : '⏳ в игре'}</span>
                    </div>
                    <div style="font-size:0.7rem; opacity:0.6;">
                        📍 Позиция: (${p.x || 1}, ${p.y || 1})
                    </div>
                </div>
            `).join('');
        }
        
        // Рейтинг по очкам
        const sortedByScore = [...playersArray].sort((a,b) => (b.score || 0) - (a.score || 0));
        if(sortedByScore.length === 0) {
            leaderboardList.innerHTML = '<li>Нет данных</li>';
        } else {
            leaderboardList.innerHTML = sortedByScore.slice(0,10).map((p, idx) => `
                <li class="${idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : ''}">
                    <span style="font-size:1.3rem;">${idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `${idx+1}.`}</span>
                    <span><strong>${escapeHtml(p.name)}</strong></span>
                    <span style="flex:1; text-align:right;">⭐ ${p.score || 0}</span>
                    <span>${p.finished ? '🏁' : '🎯'}</span>
                </li>
            `).join('');
        }
    }
    
    function escapeHtml(str) { 
        if(!str) return '';
        return String(str).replace(/[&<>]/g, function(m) { 
            if(m === '&') return '&amp;'; 
            if(m === '<') return '&lt;'; 
            if(m === '>') return '&gt;'; 
            return m; 
        }); 
    }
    
    function init() {
        // Устанавливаем ссылку в текст
        const gameLinkEl = document.getElementById('gameLink');
        if(gameLinkEl) gameLinkEl.innerHTML = `🔗 ${GAME_URL}`;
        
        // Копирование ссылки
        document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
            navigator.clipboard.writeText(GAME_URL);
            alert('✅ Ссылка скопирована!');
        });
        
        // Кнопка обновления
        document.getElementById('refreshBtn')?.addEventListener('click', () => {
            loadState();
        });
        
        // Загружаем состояние
        loadState();
        
        // Автообновление каждую секунду
        setInterval(() => { loadState(); }, 1000);
        
        // Слушаем изменения localStorage (для синхронизации с игрой)
        window.addEventListener('storage', (e) => { 
            if(e.key === `maze_${ROOM_ID}_state`) {
                loadState(); 
            }
        });
        
        // Проверяем, загрузился ли QR-код из файла, если нет — используем API
        const qrImg = document.querySelector('.qr-code img');
        if(qrImg && qrImg.complete && qrImg.naturalWidth === 0) {
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(GAME_URL)}`;
        }
    }
    
    // Запуск после загрузки страницы
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

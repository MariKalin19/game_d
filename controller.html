<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Undertale - Контроллер</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #1a1a2e;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .controller {
            background: #16213e;
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #e94560;
            max-width: 400px;
            width: 100%;
        }
        
        .title {
            text-align: center;
            color: #e94560;
            margin-bottom: 20px;
        }
        
        .dpad {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .dpad-row {
            display: flex;
            justify-content: center;
        }
        
        .dpad-btn {
            width: 80px;
            height: 80px;
            background: #2a2a3e;
            border: 2px solid #e94560;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            cursor: pointer;
            transition: all 0.05s;
            margin: 5px;
            border-radius: 15px;
            color: white;
        }
        
        .dpad-btn:active {
            background: #e94560;
            transform: scale(0.95);
        }
        
        .info {
            text-align: center;
            color: #aaa;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .status {
            text-align: center;
            color: #4ecdc4;
            margin-bottom: 15px;
        }
        
        @media (max-width: 500px) {
            .dpad-btn { width: 70px; height: 70px; font-size: 30px; }
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="controller">
        <h2 class="title">🎮 КОНТРОЛЛЕР 🎮</h2>
        <div class="status" id="status">🟢 Подключение...</div>
        
        <div class="dpad">
            <div>
                <div class="dpad-row">
                    <div></div>
                    <div class="dpad-btn" data-dx="-1" data-dy="0">▲</div>
                    <div></div>
                </div>
                <div class="dpad-row">
                    <div class="dpad-btn" data-dx="0" data-dy="-1">◀</div>
                    <div class="dpad-btn" data-dx="0" data-dy="0">●</div>
                    <div class="dpad-btn" data-dx="0" data-dy="1">▶</div>
                </div>
                <div class="dpad-row">
                    <div></div>
                    <div class="dpad-btn" data-dx="1" data-dy="0">▼</div>
                    <div></div>
                </div>
            </div>
        </div>
        
        <div class="info">
            📱 Управляй персонажем<br>
            🎮 Нажимай на кнопки
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('id');
        let peer = null;
        let conn = null;
        let playerName = localStorage.getItem('playerName') || 'Игрок';
        
        if (!roomId) {
            document.getElementById('status').innerHTML = '❌ Ошибка: ID комнаты не найден';
        } else {
            connectToGame();
        }
        
        function connectToGame() {
            peer = new Peer({
                host: '0.peerjs.com',
                port: 443,
                path: '/',
                secure: true
            });
            
            peer.on('open', () => {
                conn = peer.connect(roomId);
                setupConnection();
            });
            
            peer.on('error', (err) => {
                document.getElementById('status').innerHTML = '❌ Ошибка подключения';
            });
        }
        
        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('status').innerHTML = '✅ Подключено к игре!';
                conn.send({ type: 'join', name: playerName });
            });
            
            conn.on('close', () => {
                document.getElementById('status').innerHTML = '❌ Соединение потеряно';
            });
        }
        
        function sendInput(dx, dy) {
            if (conn && conn.open) {
                conn.send({ type: 'input', dx: dx, dy: dy });
            }
        }
        
        document.querySelectorAll('.dpad-btn').forEach(btn => {
            const dx = parseInt(btn.dataset.dx);
            const dy = parseInt(btn.dataset.dy);
            
            if (dx !== 0 || dy !== 0) {
                btn.onclick = () => sendInput(dx, dy);
            }
        });
        
        const name = prompt('Введите ваше имя:', playerName);
        if (name) {
            playerName = name;
            localStorage.setItem('playerName', playerName);
        }
    </script>
</body>
</html>
